apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: static-site
spec:
  ingressClassName: nginx
  rules:
    - host: static.localhost        # resolves to 127.0.0.1 on modern systems
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: static-site
                port:
                  number: 80
